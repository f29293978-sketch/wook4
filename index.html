<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熱量大總匯</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="grid-background"></div>
  <div id="glitch-text"></div>
  <div class="container">
    <header>
      <h1 class="neon-title">熱量<span class="accent">大總匯</span></h1>
      <p class="subtitle">羅馬不是一天造成的，但我下週要去維也納</p>
      <div class="input-section">
        <input type="text" id="userText" placeholder="輸入你的小字...">
        <button id="setTextBtn">設定</button>
      </div>
    </header>
    <main>
      <div class="card interactive-card" id="card1">
        <div class="card-content">
          <h2>牛肉可頌</h2>
          <p>星巴克的牛肉起司可頌很好吃</p>
        </div>
      </div>
      <div class="card interactive-card" id="card2">
        <div class="card-content">
          <h2>可麗露</h2>
          <p>可麗露目前都覺得不錯</p>
        </div>
      </div>
      <div class="card interactive-card" id="card3">
        <div class="card-content">
          <h2>咖喱飯</h2>
          <p>外賣～咖哩拌飯，今天晚上吃咖喱飯</p>
        </div>
      </div>
      <div class="card interactive-card" id="card4">
        <div class="card-content">
          <h2>蘋果玉露青</h2>
          <p>大茗的飲料很好喝
          </p>
        </div>
      </div>
    </main>
  </div>
  <div id="particles"></div>
  <script src="script.js"></script>
</body>
</html>
